// ═══ URL HASH AUTO-LOGIN ═════════════════════════════════════════════════════
function parseHash(){
  const h=window.location.hash.substring(1);
  if(!h)return null;
  const p=new URLSearchParams(h);
  const token=p.get('token'),account=p.get('account');
  if(token&&account){
    const cleanId=account.replace(/^act_/,'');
    return{token,accountId:cleanId,accountName:p.get('name')||''};
  }
  return null;
}
// On first load, if hash has credentials, save to localStorage and clear hash
(function(){
  const hashCfg=parseHash();
  if(hashCfg&&!LS.get('config')){
    LS.set('config',hashCfg);
    // Clear hash from URL to avoid token staying visible
    history.replaceState(null,'',window.location.pathname+window.location.search);
  }
})();

const META_API = 'https://graph.facebook.com/v21.0';

// ═══ SNAPSHOT LOADER ═══════════════════════════════════════════════════════
// In production, the dashboard reads pre-fetched Meta data from GitHub
// (data/snapshots/*.json) instead of hitting Meta directly. A scheduled
// workflow refreshes those files 3x/day. This eliminates browser-side
// rate-limit hits entirely.
const SNAPSHOT_BASE = 'https://raw.githubusercontent.com/joshkong-shadow/im8-dashboard/main/data/snapshots';
const SNAPSHOT_SCHEMA_VERSION = 1;
async function loadSnapshot(){
  const fetchJSON = async (name) => {
    // Cache-bust with a date-bucketed param so the browser picks up fresh
    // snapshots without waiting for the CDN TTL to expire.
    const url = `${SNAPSHOT_BASE}/${name}?t=${Date.now()}`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error(`${name}: ${resp.status}`);
    return resp.json();
  };
  const [metadata,campIns,adsetIns,adIns,campsMeta,adsetsMeta,activeIds,creativesData]=await Promise.all([
    fetchJSON('metadata.json'),
    fetchJSON('campaigns-insights.json'),
    fetchJSON('adsets-insights.json'),
    fetchJSON('ads-insights.json'),
    fetchJSON('campaigns-meta.json'),
    fetchJSON('adsets-meta.json'),
    fetchJSON('active-ids.json'),
    fetchJSON('creatives.json'),
  ]);
  if(metadata?.schema_version !== SNAPSHOT_SCHEMA_VERSION){
    throw new Error(`Snapshot schema version mismatch (got ${metadata?.schema_version}, expected ${SNAPSHOT_SCHEMA_VERSION}). Dashboard needs update.`);
  }
  return {metadata,campIns,adsetIns,adIns,campsMeta,adsetsMeta,activeIds,creativesData};
}

// Lightweight check — fetch only metadata.json to see if a snapshot exists.
// Used to bypass the Settings screen for read-only colleague users.
async function checkSnapshotExists(){
  try{
    const resp = await fetch(`${SNAPSHOT_BASE}/metadata.json?t=${Date.now()}`);
    if(!resp.ok) return null;
    return await resp.json();
  }catch(e){
    return null;
  }
}

// Trigger a manual snapshot refresh via GitHub Actions workflow_dispatch.
async function triggerSnapshotRefresh(ghToken){
  const resp = await fetch('https://api.github.com/repos/joshkong-shadow/im8-dashboard/actions/workflows/snapshot.yml/dispatches',{
    method:'POST',
    headers:{
      'Authorization':'token '+ghToken,
      'Accept':'application/vnd.github.v3+json',
      'Content-Type':'application/json',
    },
    body:JSON.stringify({ref:'main',inputs:{reason:'dashboard refresh'}}),
  });
  if(!resp.ok){
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.message || `workflow_dispatch ${resp.status}`);
  }
  return true;
}

// Generic helper: fetch the set of currently-ACTIVE entity IDs at the given
// level (ads, adsets, campaigns). Used by Inefficiencies to exclude
// paused/archived entries from each report.
async function fetchActiveEntityIds(token, accountId, endpoint){
  const ids = new Set();
  const params = new URLSearchParams({
    access_token: token,
    fields: 'id',
    filtering: JSON.stringify([{field:'effective_status', operator:'IN', value:['ACTIVE']}]),
    limit: 500,
  });
  let url = `${META_API}/act_${accountId}/${endpoint}?${params}`;
  while(url){
    const resp = await fetch(url);
    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }
    const json = await resp.json();
    for(const r of json.data || []) ids.add(r.id);
    url = json.paging?.next || null;
  }
  return ids;
}
const fetchActiveAdIds = (token, accountId) => fetchActiveEntityIds(token, accountId, 'ads');
const fetchActiveAdsetIds = (token, accountId) => fetchActiveEntityIds(token, accountId, 'adsets');
const fetchActiveCampaignIds = (token, accountId) => fetchActiveEntityIds(token, accountId, 'campaigns');

// Fetch active entities WITH metadata (for Campaign Mgmt tab: daily_budget, bid_strategy).
async function fetchActiveEntitiesWithMeta(token, accountId, endpoint, extraFields){

  const params = new URLSearchParams({
    access_token: token,
    fields: 'id,name,'+extraFields,
    filtering: JSON.stringify([{field:'effective_status', operator:'IN', value:['ACTIVE']}]),

    const resp = await fetch(url);
    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }
    const json = await resp.json();
    out.push(...(json.data || []));
    url = json.paging?.next || null;
  }
  return out;
}

// Fetch ad-level insights scoped to specific ad IDs (used for the
// Inefficiencies p14/p28 secondary fetch — Meta silently caps full
// account-wide ad-level fetches over wide date ranges).
async function fetchAdInsightsByIds(token, accountId, adIds, dateFrom, dateTo){
  const out = [];
  // Chunk IDs in batches of 50 to stay well under Meta's filter value limit
  for(let i=0; i<adIds.length; i+=50){
    const batch = adIds.slice(i, i+50);
    const params = new URLSearchParams({
      access_token: token,
      level: 'ad',
      fields: 'ad_id,ad_name,adset_name,campaign_name,spend,actions,action_values',
      time_range: JSON.stringify({since: dateFrom, until: dateTo}),
      time_increment: 1,
      filtering: JSON.stringify([{field:'ad.id', operator:'IN', value: batch}]),
      limit: 500,
    });
    let url = `${META_API}/act_${accountId}/insights?${params}`;
    while(url){
      const resp = await fetch(url);
      if(!resp.ok){
        const err = await resp.json().catch(()=>({}));
        throw new Error(err.error?.message || `API error ${resp.status}`);
      }
      const json = await resp.json();
      out.push(...(json.data || []));
      url = json.paging?.next || null;
    }
  }
  return out;
}

async function fetchInsights(token, accountId, level, dateFrom, dateTo){
  // level = 'campaign', 'adset', or 'ad'
  const fields = level === 'campaign'
    ? 'campaign_id,campaign_name,spend,actions,action_values,reach,frequency'
    : level === 'adset'
    ? 'adset_id,adset_name,campaign_id,campaign_name,spend,actions,action_values,reach,frequency'
    : 'ad_id,ad_name,adset_name,campaign_name,spend,actions,action_values,reach,frequency';

  let allData = [];
  let url = `${META_API}/act_${accountId}/insights?` + new URLSearchParams({
    access_token: token,
    level,
    fields,
    time_range: JSON.stringify({since: dateFrom, until: dateTo}),
    time_increment: 1,
    limit: 500,
  });

  while(url){
    const resp = await fetch(url);
    if(!resp.ok){
      const err = await resp.json().catch(()=>({}));
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }
    const json = await resp.json();
    allData = allData.concat(json.data || []);
    url = json.paging?.next || null;
  }
  return allData;
}

function parseMetaRow(row){
  const actions = row.actions || [];
  const actionValues = row.action_values || [];
  const getAction = (list, type) => {
    // Try multiple action type variants
    const types = [type, `offsite_conversion.fb_pixel_${type}`, `omni_${type}`];
    for(const t of types){
      const found = list.find(a => a.action_type === t);
      if(found) return parseFloat(found.value) || 0;
    }
    return 0;
  };
  return {
    spend: parseFloat(row.spend) || 0,
    purchases: getAction(actions, 'purchase'),
    revenue: getAction(actionValues, 'purchase'),
    atc: getAction(actions, 'add_to_cart'),
    lpv: getAction(actions, 'landing_page_view'),
  };
}

// ═══ CREATIVE THUMBNAILS ════════════════════════════════════════════════════
async function fetchAdCreatives(token, adIds){
  const cached = LS.get('creatives',{});
  const needed = adIds.filter(id=>!cached[id]);
  // Batch in groups of 50 using ?ids= batch endpoint
  for(let i=0;i<needed.length;i+=50){
    const batch=needed.slice(i,i+50);
    const url=`${META_API}/?ids=${batch.join(',')}&fields=creative{thumbnail_url,image_url,effective_object_story_id}&access_token=${token}`;
    try{
      const resp=await fetch(url);
      if(resp.ok){
        const json=await resp.json();
        for(const[adId,data] of Object.entries(json)){
          const c=data.creative||{};
          cached[adId]={
            thumb:c.thumbnail_url||c.image_url||null,
            hiRes:c.image_url||c.thumbnail_url||null,
            preview:c.effective_object_story_id?'https://www.facebook.com/'+c.effective_object_story_id:null,
          };
        }
      }
    }catch(e){console.error('Creative fetch error:',e);}
  }
  // Cache missing ones as empty so we don't re-fetch
  for(const id of needed){if(!cached[id])cached[id]={thumb:null,preview:null};}
  LS.set('creatives',cached);
  return cached;
}

// ═══ AGGREGATE ══════════════════════════════════════════════════════════════
function aggregate(rows, curFrom, curTo, priFrom, priTo, w7From, w7To){
  const bd={};
  for(const r of rows){
    const d=r.day;if(!bd[d])bd[d]={s:0,p:0,r:0,a:0,l:0};
    bd[d].s+=r.spend;bd[d].p+=r.purch;bd[d].r+=r.rev;bd[d].a+=r.atc;bd[d].l+=r.lpv;
  }
  const sumRange=(from,to)=>{let s=0,p=0,r=0,a=0,l=0;for(const[d,v] of Object.entries(bd)){if(d>=from&&d<=to){s+=v.s;p+=v.p;r+=v.r;a+=v.a;l+=v.l;}}return{s,p,r,a,l};};
  const mk=o=>({s:o.s,p:o.p,roas:o.s>0?o.r/o.s:0,cpa:o.p>0?o.s/o.p:null,atc:o.l>0?o.a/o.l*100:0,cvr:o.l>0?o.p/o.l*100:0});
  const curData=sumRange(curFrom,curTo), priData=sumRange(priFrom,priTo), w7Data=sumRange(w7From,w7To), totData=sumRange('0000-00-00','9999-99-99');
  return{tot:mk(totData),d2:(curData.s>0||curData.p>0)?mk(curData):null,d1:(priData.s>0||priData.p>0)?mk(priData):null,w7:(w7Data.s>0||w7Data.p>0)?mk(w7Data):null,cnt:new Set(rows.map(r=>r.name)).size};
}

// ═══ DOD CELL ═══════════════════════════════════════════════════════════════
// Dual-window cell used by Inefficiencies tab + Summary inefficiency section.
// p7 (top, big, optionally ROAS-colored) and p14 (below, dim).
function DualCell({p7,p14,format,colorByRoas}){
  const f=v=>{if(v==null)return"\u2014";if(format==="$")return"$"+Math.round(v).toLocaleString();if(format==="x")return v.toFixed(2)+"x";if(format==="n")return Math.round(v).toLocaleString();if(format==="%")return v.toFixed(1)+"%";return String(v);};
  if(colorByRoas){
    const c=v=>v==null?'#94a3b8':v>=0.95?'#34d399':v>=0.7?'#fbbf24':'#f87171';
    const bg=v=>v==null?'transparent':v>=0.95?'#06261a':v>=0.7?'#26230a':'#260a0a';
    return React.createElement('div',{style:{textAlign:'center'}},
      React.createElement('div',{style:{background:bg(p7),color:c(p7),padding:'2px 6px',borderRadius:3,fontSize:13,fontWeight:600,...S.mono,display:'inline-block',minWidth:48}},f(p7)),
      React.createElement('div',{style:{color:c(p14),fontSize:11,...S.mono,marginTop:2,opacity:0.7}},f(p14))
    );
  }
  return React.createElement('div',null,
    React.createElement('div',{style:{color:'#e2e8f0',fontSize:13,fontWeight:600,...S.mono}},f(p7)),
    React.createElement('div',{style:{color:'#586880',fontSize:11,...S.mono,marginTop:2}},f(p14))
  );
}

function DoDCell({cur,prev,w7,format,invert,isRoas}){
  const f=v=>{if(v==null)return"\u2014";if(format==="$")return"$"+Math.round(v).toLocaleString();if(format==="%")return v.toFixed(1)+"%";if(format==="cvr")return v.toFixed(2)+"%";if(format==="x")return v.toFixed(2)+"x";if(format==="n")return Math.round(v).toLocaleString();return String(v);};
  const sz={fontSize:13,fontWeight:600,...S.mono};
  const w7Line=w7!=null&&React.createElement('div',{style:{color:'#586880',fontSize:10,fontWeight:500,...S.mono,marginTop:1}},'['+f(w7)+']');

  // Determine arrow for non-ROAS cells
  let arrow=null;
  if(!isRoas&&cur!=null&&prev!=null){
    const d=cur-prev;
    const t=format==="$"?3:0.2;
    if(Math.abs(d)>t){
      const good=invert?d<0:d>0;
      arrow=React.createElement('span',{style:{marginLeft:4,fontSize:13,color:good?'#34d399':'#f87171'}},good?'\u2191':'\u2193');
    }
  }

  if(isRoas&&cur!=null){
    const rc=cur>=0.95?'#34d399':cur>=0.7?'#fbbf24':'#f87171';
    const bg=cur>=0.95?'#06261a':cur>=0.7?'#26230a':'#260a0a';
    return React.createElement('div',{style:{textAlign:'center'}},
      React.createElement('div',{style:{background:bg,color:rc,padding:'2px 6px',borderRadius:3,...sz,display:'inline-block',minWidth:48}},f(cur)),
      prev!=null&&React.createElement('div',{style:{color:'#94a3b8',...sz,marginTop:2}},f(prev)),
      w7Line
    );
  }
  return React.createElement('div',null,
    React.createElement('div',{style:{color:'#e2e8f0',...sz}},f(cur),arrow),
    prev!=null&&React.createElement('div',{style:{color:'#94a3b8',...sz,marginTop:2}},f(prev)),
    w7Line
  );
}

// ═══ ADSET EDITOR ═══════════════════════════════════════════════════════════
function AdsetEditor({name,currentCat,options,type,overrides,onSave}){
  const[creating,setCreating]=useState(false);
  const[nn,setNn]=useState("");
  const assign=val=>{const nx={...overrides};if(!nx[name])nx[name]={};const def=type==="angle"?autoAngle(name):autoLander(name);if(val===def){delete nx[name][type];if(Object.keys(nx[name]).length===0)delete nx[name];}else nx[name][type]=val;onSave(nx);setCreating(false);setNn("");};
  return React.createElement('div',{style:{marginBottom:10,padding:'10px 12px',background:'#0e1425',borderRadius:6,border:'1px solid #1e293b'}},
    React.createElement('div',{style:{fontSize:11,color:'#e2e8f0',fontWeight:500,marginBottom:6,lineHeight:1.3,wordBreak:'break-word'}},name),
    !creating
      ? React.createElement('div',null,
          React.createElement('select',{value:currentCat,onChange:e=>{if(e.target.value==="__NEW__"){setCreating(true);return;}assign(e.target.value);},style:{width:'100%',background:'#1e293b',border:'1px solid #334155',borderRadius:4,padding:'6px 8px',color:'#e2e8f0',fontSize:11,outline:'none',cursor:'pointer'}},
            options.map(o=>React.createElement('option',{key:o,value:o},o)),

function AdTagSelect({name,field,options,overrides,onSave}){
  const[creating,setCreating]=useState(false);
  const[nn,setNn]=useState("");
  const current=overrides[name]?.[field]||'Untagged';
  const assign=val=>{
    const nx={...overrides};
    if(!nx[name])nx[name]={};
    if(val==='Untagged'){delete nx[name][field];if(Object.keys(nx[name]).length===0)delete nx[name];}
    else nx[name][field]=val;
    onSave(nx);setCreating(false);setNn("");

      )
    : React.createElement('select',{value:current,onChange:e=>{if(e.target.value==='__NEW__'){setCreating(true);return;}assign(e.target.value);},style:{width:'100%',background:'#1e293b',border:'1px solid #334155',borderRadius:4,padding:'8px 10px',color:'#e2e8f0',fontSize:12,outline:'none',cursor:'pointer'}},

function Settings({onSave,initial}){
  const cfg=initial||{};
  const[token,setToken]=useState(cfg.token||'');
  const[accountId,setAccountId]=useState(cfg.accountId||'');
  const[testing,setTesting]=useState(false);
  const[error,setError]=useState('');
  const[success,setSuccess]=useState(false);

  const test=async()=>{
    setTesting(true);setError('');setSuccess(false);
    try{
      const cleanId = accountId.replace(/^act_/,'');
      const resp=await fetch(`${META_API}/act_${cleanId}?access_token=${token}&fields=name,currency`);
      const json=await resp.json();
      if(json.error)throw new Error(json.error.message);
      setSuccess(true);
      setTimeout(()=>onSave({token,accountId:cleanId,accountName:json.name}),800);

      ),
      React.createElement('label',{style:{display:'block',marginBottom:20}},
        React.createElement('div',{style:{fontSize:12,color:'#94a3b8',marginBottom:6,fontWeight:600}},'Ad Account ID'),
        React.createElement('input',{value:accountId,onChange:e=>setAccountId(e.target.value),placeholder:'e.g. act_123456789 or just 123456789',style:S.input})
      ),
      error&&React.createElement('div',{style:{color:'#f87171',fontSize:12,marginBottom:12,padding:'8px 12px',background:'#2e0a0a',borderRadius:6}},error),
      success&&React.createElement('div',{style:{color:'#34d399',fontSize:12,marginBottom:12,padding:'8px 12px',background:'#06261a',borderRadius:6}},'Connected successfully! Loading dashboard...'),
      React.createElement('button',{onClick:test,disabled:testing||!token||!accountId,style:{width:'100%',padding:'10px',background:testing?'#1e293b':'#1e40af',border:'none',borderRadius:6,color:'#e2e8f0',fontSize:14,fontWeight:600,cursor:testing?'default':'pointer',opacity:(!token||!accountId)?0.5:1}},
        testing?React.createElement('span',null,React.createElement('span',{className:'spinner',style:{marginRight:8}}),'Testing connection...'):' Connect & Launch'
      )
    ),
    React.createElement('div',{style:{marginTop:16,fontSize:11,color:'#334155',textAlign:'center'}},'Your token is stored in this browser only. It never leaves your machine.')
  );
}

// ═══ MAIN DASHBOARD ═════════════════════════════════════════════════════════
function Dashboard(){
  const[config,setConfig]=useState(()=>LS.get('config',null));
  const[tab,setTab]=useState("summary");
  const[ov,setOv]=useState(()=>LS.get('overrides',{}));
  const[notes,setNotes]=useState(()=>LS.get('notes',{}));
  const[buckets,setBuckets]=useState(()=>LS.get('buckets',{})); // lander name -> bucket name
  const[editingNote,setEditingNote]=useState(null);
  const[editingBucket,setEditingBucket]=useState(null);
  const[defaultsLoaded,setDefaultsLoaded]=useState(false);

  // Save a description note for a campaign/angle/lander
  const saveNote=useCallback((key,text)=>{
    const nx={...notes};
    if(text.trim())nx[key]=text.trim();else delete nx[key];
    setNotes(nx);LS.set('notes',nx);
    setEditingNote(null);
  },[notes]);

  // Save a bucket assignment for a lander
  const saveBucket=useCallback((lander,bucket)=>{
    const nx={...buckets};
    if(bucket.trim())nx[lander]=bucket.trim();else delete nx[lander];
    setBuckets(nx);LS.set('buckets',nx);
    setEditingBucket(null);
  },[buckets]);

  // Load default overrides + notes from repo — always use repo as source of truth
  useEffect(()=>{
    DEFAULT_OVERRIDES_PROMISE.then(defaults=>{
      if(defaults&&Object.keys(defaults).length>0){
        const defOv=defaults.overrides||defaults;
        const defNotes=defaults.notes||{};
        const defBuckets=defaults.buckets||{};
        // Always update from repo (repo = published source of truth)
        setOv(defOv);LS.set('overrides',defOv);
        if(Object.keys(defNotes).length>0){setNotes(defNotes);LS.set('notes',defNotes);}
        if(Object.keys(defBuckets).length>0){setBuckets(defBuckets);LS.set('buckets',defBuckets);}
      }
      setDefaultsLoaded(true);
    });
  },[]);

  // Publish overrides + notes to GitHub repo
  const[publishing,setPublishing]=useState(false);
  const[publishMsg,setPublishMsg]=useState('');
  // Publish Daily Action Items + Campaign Mgmt reports to GitHub (overwrite)
  const[publishingReports,setPublishingReports]=useState(false);
  const[publishReportsMsg,setPublishReportsMsg]=useState('');
  // Snapshot freshness + manual refresh state
  const[snapshotMeta,setSnapshotMeta]=useState(null);
  const[refreshingSnapshot,setRefreshingSnapshot]=useState(false);
  const[refreshSnapshotMsg,setRefreshSnapshotMsg]=useState('');
  // Settings-bypass: while we check if a snapshot exists, show a brief spinner
  // instead of flashing the Settings screen for read-only colleagues.
  const[bootstrapping,setBootstrapping]=useState(true);
  const publishToGithub=useCallback(async()=>{
    let ghToken=LS.get('gh_token','');
    if(!ghToken){
      ghToken=prompt('Enter a GitHub Personal Access Token with repo scope.\nThis is stored in your browser only and never shared.');
      if(!ghToken)return;
      LS.set('gh_token',ghToken);
    }
    setPublishing(true);setPublishMsg('');
    try{
      const content=JSON.stringify({overrides:ov,notes,buckets},null,2);
      const encoded=btoa(unescape(encodeURIComponent(content)));
      // Get current file SHA (needed for update)
      const getResp=await fetch('https://api.github.com/repos/joshkong-shadow/im8-dashboard/contents/default-overrides.json',{
        headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}
      });
      const getCurrent=getResp.ok?await getResp.json():null;
      const sha=getCurrent?.sha||undefined;
      // Push update
      const body={message:'Update overrides + notes from dashboard',content:encoded};
      if(sha)body.sha=sha;
      const putResp=await fetch('https://api.github.com/repos/joshkong-shadow/im8-dashboard/contents/default-overrides.json',{
        method:'PUT',
        headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!putResp.ok){
        const err=await putResp.json().catch(()=>({}));
        if(putResp.status===401||putResp.status===403){LS.set('gh_token','');throw new Error('Invalid token — cleared. Try again.');}
        throw new Error(err.message||'GitHub API error '+putResp.status);
      }
      setPublishMsg('Published!');
      setTimeout(()=>setPublishMsg(''),3000);
    }catch(e){setPublishMsg('Error: '+e.message);}
    setPublishing(false);
  },[ov,notes,buckets]);

  // Publish both reports (Daily Action Items + Campaign Mgmt) as plaintext
  // files in reports/. Overwrites each on every press; git history = audit trail.
  const publishReportsToGithub=useCallback(async()=>{
    let ghToken=LS.get('gh_token','');
    if(!ghToken){
      ghToken=prompt('Enter a GitHub Personal Access Token with repo scope.\nThis is stored in your browser only and never shared.');
      if(!ghToken)return;
      LS.set('gh_token',ghToken);
    }
    setPublishingReports(true);setPublishReportsMsg('');
    const repo='joshkong-shadow/im8-dashboard';
    const putFile=async(path,content,commitMsg)=>{
      const getResp=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
        headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}
      });
      const existing=getResp.ok?await getResp.json():null;
      const sha=existing?.sha||undefined;
      const body={message:commitMsg,content:btoa(unescape(encodeURIComponent(content)))};
      if(sha)body.sha=sha;
      const putResp=await fetch(`https://api.github.com/repos/${repo}/contents/${path}`,{
        method:'PUT',
        headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      if(!putResp.ok){
        const err=await putResp.json().catch(()=>({}));
        if(putResp.status===401||putResp.status===403){LS.set('gh_token','');throw new Error('Invalid token \u2014 cleared. Try again.');}
        throw new Error(err.message||('GitHub API error '+putResp.status));
      }
    };
    try{
      const dateLabel=new Date(curTo+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const dai=buildDailyActionItemsText();
      const cmm=buildCampMgmtText();
      await Promise.all([
        putFile('reports/daily-action-items-latest.md',dai,'Update daily action items report \u2014 '+dateLabel),
        putFile('reports/campaign-mgmt-latest.md',cmm,'Update campaign mgmt report \u2014 '+dateLabel),
      ]);
      setPublishReportsMsg('Saved!');
      setTimeout(()=>setPublishReportsMsg(''),3000);
    }catch(e){setPublishReportsMsg('Error: '+e.message);}
    setPublishingReports(false);
  },[buildDailyActionItemsText,buildCampMgmtText,curTo]);

  const[campRaw,setCampRaw]=useState([]);
  const[adsetRaw,setAdsetRaw]=useState([]);
  const[adLevelRaw,setAdLevelRaw]=useState([]);
  const[creatives,setCreatives]=useState(()=>LS.get('creatives',{}));
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  const[ep,setEp]=useState(null);
  const[adTagging,setAdTagging]=useState(null); // ad name being tagged
  const[snapFilter,setSnapFilter]=useState('');
  const[snapApplied,setSnapApplied]=useState('');
  const[goldMineLimit,setGoldMineLimit]=useState(25);
  const[volumeLimit,setVolumeLimit]=useState(25);
  const[campDrill,setCampDrill]=useState(null);
  const[drillDown,setDrillDown]=useState(null); // {type:'angle'|'lander', name:'...'}
  // Copy-to-clipboard status for Daily Action Items button
  const[copyStatus,setCopyStatus]=useState(''); // '' | 'copied' | 'error'
  // Campaign Management tab state
  const[campMgmtCampsMeta,setCampMgmtCampsMeta]=useState(null);     // active campaigns with daily_budget/bid_strategy
  const[campMgmtAdsetsMeta,setCampMgmtAdsetsMeta]=useState(null);   // active adsets with daily_budget (for ABO sum)
  const[campMgmtLoading,setCampMgmtLoading]=useState(false);
  const[campMgmtError,setCampMgmtError]=useState('');
  const[scaleRoasUpper,setScaleRoasUpper]=useState(()=>LS.get('scale_roas_upper',1.2));
  const[scaleRoasLower,setScaleRoasLower]=useState(()=>LS.get('scale_roas_lower',0.6));
  const[campMgmtCopyStatus,setCampMgmtCopyStatus]=useState('');
  // Inefficiencies tab state
  const[ineffCampLimit,setIneffCampLimit]=useState(30);
  const[ineffAdsetLimit,setIneffAdsetLimit]=useState(30);
  const[ineffAdLimit,setIneffAdLimit]=useState(30);
  const[ineffCampExpanded,setIneffCampExpanded]=useState(null);
  const[ineffAdsetExpanded,setIneffAdsetExpanded]=useState(null);
  const[ineffAdExpanded,setIneffAdExpanded]=useState(null);
  // Budget Tankers (separate filter: today's spend share + ROAS, current/prior period)
  const[budgetTankerLimit,setBudgetTankerLimit]=useState(30);
  const[budgetTankerExpanded,setBudgetTankerExpanded]=useState(null);
  // Inefficiencies tab does its own fetches on tab open so the main flow
  // (used by every other tab) stays lean and fast.
  const[ineffCampRaw,setIneffCampRaw]=useState([]);
  const[ineffAdsetRaw,setIneffAdsetRaw]=useState([]);
  const[ineffMainLoading,setIneffMainLoading]=useState(false);
  const[ineffMainError,setIneffMainError]=useState('');
  // Two-step ad fetch: p7d candidates come from main adLevelRaw; p14
  // data is fetched on-demand for those candidate ad IDs (Meta silently
  // caps wide account-wide ad-level fetches).
  const[ineffAdLongRaw,setIneffAdLongRaw]=useState([]);
  const[ineffAdLongLoading,setIneffAdLongLoading]=useState(false);
  const[ineffAdLongError,setIneffAdLongError]=useState('');
  // Active entity IDs (effective_status=ACTIVE) — used to exclude paused/off
  // entries from each Inefficiencies report. null = not yet fetched.
  const[activeAdIds,setActiveAdIds]=useState(null);
  const[activeAdsetIds,setActiveAdsetIds]=useState(null);
  const[activeCampIds,setActiveCampIds]=useState(null);
  const[activeAdsLoading,setActiveAdsLoading]=useState(false);
  const[activeAdsError,setActiveAdsError]=useState('');

  const[bn,setBn]=useState('');
  const[fms,setFms]=useState(0);
  const[fr,setFr]=useState('all');
  const[lastFetch,setLastFetch]=useState(null);

  // Date picker: default to yesterday vs day before
  const today = new Date();
  const yesterday = new Date(today);yesterday.setDate(today.getDate()-1);
  const dayBefore = new Date(today);dayBefore.setDate(today.getDate()-2);
  const fmt=d=>d.toISOString().split('T')[0];
  const[curFrom,setCurFrom]=useState(fmt(yesterday));
  const[curTo,setCurTo]=useState(fmt(yesterday));
  const[priFrom,setPriFrom]=useState(fmt(dayBefore));
  const[priTo,setPriTo]=useState(fmt(dayBefore));
  // 7-day trailing window ending on curTo
  const w7To=curTo;
  const w7From=useMemo(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-6);return fmt(d);},[curTo]);
  // 14-day trailing window used by Inefficiencies tab
  const w14From=useMemo(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-13);return fmt(d);},[curTo]);
  // Yesterday's p7d window (curTo-7 to curTo-1) — for Red Alert day-over-day
  const p7YestFrom=useMemo(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-7);return fmt(d);},[curTo]);
  const p7YestTo=useMemo(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-1);return fmt(d);},[curTo]);

  const save=useCallback(nx=>{setOv(nx);LS.set('overrides',nx);},[]);

  const handleConfigSave=(cfg)=>{LS.set('config',cfg);setConfig(cfg);};

  // On mount: if no config in localStorage, try to bypass Settings by
  // creating a stub config from the snapshot metadata. Read-only users
  // (colleagues) never need to enter a Meta token.
  useEffect(()=>{
    if(config){setBootstrapping(false);return;}
    checkSnapshotExists().then(meta=>{
      if(meta){
        const stub={
          token:'',
          accountId:meta.account_id||'',
          accountName:'IM8',
        };
        LS.set('config',stub);
        setConfig(stub);
      }
      setBootstrapping(false);
    });
  },[]);

  // Auto-poll for new snapshots every 5 minutes. If the metadata's
  // fetched_at changes, reload data so users with the dashboard open
  // see new scheduled snapshots automatically.
  useEffect(()=>{
    if(!config||!snapshotMeta)return;
    const intervalId=setInterval(async()=>{
      try{
        const newMeta=await checkSnapshotExists();
        if(newMeta&&newMeta.fetched_at!==snapshotMeta.fetched_at){
          await fetchData();
        }
      }catch(e){/* silent — retry on next poll */}
    },300000); // 5 min
    return ()=>clearInterval(intervalId);
  },[config,snapshotMeta,fetchData]);

  // Refresh Now: trigger the snapshot workflow via GitHub Actions dispatch,
  // then auto-reload data after ~2 min.
  const handleRefreshSnapshot=useCallback(async()=>{
    let ghToken=LS.get('gh_token','');
    if(!ghToken){
      ghToken=prompt('Enter a GitHub Personal Access Token with repo + workflow scope.\nThis is stored in your browser only.');
      if(!ghToken)return;
      LS.set('gh_token',ghToken);
    }
    setRefreshingSnapshot(true);setRefreshSnapshotMsg('');
    try{
      await triggerSnapshotRefresh(ghToken);
      setRefreshSnapshotMsg('Triggered! Auto-reloading in ~2 min...');
      // Wait 2.5 min then auto-reload snapshot
      setTimeout(async()=>{
        setRefreshSnapshotMsg('Reloading fresh data...');
        try{
          await fetchData();
          setRefreshSnapshotMsg('Updated!');
        }catch(e){
          setRefreshSnapshotMsg('Reload failed: '+e.message);
        }
        setTimeout(()=>setRefreshSnapshotMsg(''),4000);
        setRefreshingSnapshot(false);
      },150000); // 150s = 2.5 min
    }catch(e){
      setRefreshSnapshotMsg('Error: '+e.message);
      setRefreshingSnapshot(false);
      if(/401|403/.test(e.message)){LS.set('gh_token','');}
    }
  },[fetchData]);

  // Snapshot-backed fetchData: reads pre-fetched JSONs from GitHub instead
  // of hitting Meta. Populates every state var the dashboard depends on.
  const fetchData=useCallback(async()=>{
    if(!config)return;
    setLoading(true);setIneffMainLoading(true);setActiveAdsLoading(true);setCampMgmtLoading(true);
    setError('');
    try{
      const snap=await loadSnapshot();

      // Parse campaign insights (ALL campaigns for ineff; _MT filter happens downstream)
      const campRowsAll=snap.campIns.map(r=>{
        const p=parseMetaRow(r);
        return{
          id: r.campaign_id||'',
          name: r.campaign_name||'',
          rawName: r.campaign_name||'',
          day: r.date_start,
          spend:p.spend, purch:p.purchases, rev:p.revenue, atc:p.atc, lpv:p.lpv,
        };
      });
      // Parse adset insights
      const adsetRowsAll=snap.adsetIns.map(r=>{
        const p=parseMetaRow(r);
        return{
          id: r.adset_id||'',
          name: r.adset_name||'Unknown',
          campaign: r.campaign_name||'',
          day: r.date_start,
          spend:p.spend, purch:p.purchases, rev:p.revenue, atc:p.atc, lpv:p.lpv,
        };
      });
      // Parse ad insights
      const adRowsAll=snap.adIns.map(r=>{
        const p=parseMetaRow(r);
        return{
          adId: r.ad_id||'',
          name: r.ad_name||'Unknown',
          adset: r.adset_name||'',
          campaign: r.campaign_name||'',
          day: r.date_start,
          spend:p.spend, purch:p.purchases, rev:p.revenue, atc:p.atc, lpv:p.lpv,
        };
      });

      // campRaw / adsetRaw = _MT scope for main tabs (Campaigns, Angles, Landers)
      // ineffCampRaw / ineffAdsetRaw = unfiltered, for Inefficiencies + Campaign Mgmt
      setCampRaw(campRowsAll.filter(r=>/_MT/.test(r.name)));
      setAdsetRaw(adsetRowsAll.filter(r=>/_MT/.test(r.campaign||'')));
      setAdLevelRaw(adRowsAll);
      setIneffCampRaw(campRowsAll);
      setIneffAdsetRaw(adsetRowsAll);
      // Raw ad rows for the ineffAds p14d aggregation (memo expects date_start/ad_name shape)
      setIneffAdLongRaw(snap.adIns);

      // Active entity ID sets
      setActiveCampIds(new Set(snap.activeIds.campaigns||[]));
      setActiveAdsetIds(new Set(snap.activeIds.adsets||[]));
      setActiveAdIds(new Set(snap.activeIds.ads||[]));

      // Campaign Mgmt entity metadata (daily_budget, bid_strategy)
      setCampMgmtCampsMeta(snap.campsMeta);
      setCampMgmtAdsetsMeta(snap.adsetsMeta);

      // Creative thumbnails (merge with anything already in localStorage)
      const cr={...LS.get('creatives',{}),...(snap.creativesData||{})};
      setCreatives(cr);
      LS.set('creatives',cr);

      // Snapshot freshness metadata (banner + warning)
      setSnapshotMeta(snap.metadata);
      setLastFetch(new Date().toLocaleTimeString());
    }catch(e){
      setError('Snapshot load failed: '+e.message+' — the scheduled snapshot may not have run yet, or your connection dropped. Try Refresh Now.');
    }
    setLoading(false);setIneffMainLoading(false);setActiveAdsLoading(false);setCampMgmtLoading(false);
  },[config]);

  // Auto-fetch on config load only. Date changes just re-aggregate existing
  // snapshot data in memory — no new fetch needed.
  useEffect(()=>{if(config)fetchData();},[config]);

  // Process adsets with overrides — _ALT filter only (adsetRaw is already _MT-scoped)
  const ads=useMemo(()=>adsetRaw.filter(r=>/_ALT/.test(r.name)).map(r=>{
    const o=ov[r.name]||{};
    return{...r,angle:o.angle||autoAngle(r.name),lander:o.lander||autoLander(r.name)};
  }),[adsetRaw,ov]);

  // Group helper
  const grp=(key)=>{
    const g={};
    for(const a of ads){const k=a[key];if(!g[k])g[k]=[];g[k].push(a);}
    return Object.entries(g).map(([n,rows])=>({n,...aggregate(rows,curFrom,curTo,priFrom,priTo,w7From,w7To)})).sort((a,b)=>b.tot.s-a.tot.s);
  };
  const angD=useMemo(()=>grp("angle"),[ads,curFrom,curTo,priFrom,priTo,w7From,w7To]);
  const lnD=useMemo(()=>grp("lander"),[ads,curFrom,curTo,priFrom,priTo,w7From,w7To]);

  // Bucket aggregation — group landers into buckets
  const bucketD=useMemo(()=>{
    // Each adset gets its lander's bucket assignment
    const bucketedAds=ads.map(a=>({...a,bucket:buckets[a.lander]||'Unassigned'}));
    const g={};
    for(const a of bucketedAds){const k=a.bucket;if(!g[k])g[k]=[];g[k].push(a);}
    return Object.entries(g).map(([n,rows])=>({n,...aggregate(rows,curFrom,curTo,priFrom,priTo,w7From,w7To),landerCount:new Set(rows.map(r=>r.lander)).size})).sort((a,b)=>b.tot.s-a.tot.s);
  },[ads,buckets,curFrom,curTo,priFrom,priTo,w7From,w7To]);

  // Campaign aggregation — count adsets from adsetRaw
  const campAdsetCounts=useMemo(()=>{
    const c={};
    for(const a of adsetRaw){
      const k=a.campaign;
      if(!c[k])c[k]=new Set();
      c[k].add(a.name);
    }
    const out={};
    for(const[k,s]of Object.entries(c))out[k]=s.size;
    return out;
  },[adsetRaw]);
  const campD=useMemo(()=>{
    const g={};
    for(const r of campRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    return Object.entries(g).map(([n,rows])=>({n,...aggregate(rows,curFrom,curTo,priFrom,priTo,w7From,w7To),cnt:campAdsetCounts[n]||0})).sort((a,b)=>b.tot.s-a.tot.s);
  },[campRaw,curFrom,curTo,priFrom,priTo,w7From,w7To,campAdsetCounts]);

  // Ad-level aggregation
  const adD=useMemo(()=>{
    const g={};
    for(const r of adLevelRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    return Object.entries(g).map(([n,rows])=>{
      const agg=aggregate(rows,curFrom,curTo,priFrom,priTo,w7From,w7To);
      const adId=rows[0]?.adId||'';
      const o=ov[n]||{};
      return{n,adId,...agg,persona:o.persona||'Untagged',format:o.format||'Untagged'};
    });
  },[adLevelRaw,curFrom,curTo,priFrom,priTo,w7From,w7To,ov]);

  // ═══ INEFFICIENCIES TAB DATA ════════════════════════════════════════════
  // Aggregate raw rows into 2 trailing windows (p7/p14) ending on curTo
  const aggregateIneff=useCallback((rows)=>{
    const sumRange=(from,to)=>{let s=0,p=0,r=0,a=0,l=0;for(const x of rows){if(x.day>=from&&x.day<=to){s+=x.spend;p+=x.purch;r+=x.rev;a+=x.atc;l+=x.lpv;}}return{s,p,roas:s>0?r/s:0,cpa:p>0?s/p:null,atc:l>0?a/l*100:0,cvr:l>0?p/l*100:0};};
    return{p7:sumRange(w7From,curTo),p14:sumRange(w14From,curTo)};
  },[w7From,w14From,curTo]);

  // Lazy-fetch unfiltered campaign + adset data for the Inefficiencies tab,
  // the Inefficiencies Summary section, and the Campaign Management tab.
  // Other tabs use the main filtered fetch.
  useEffect(()=>{
    if((tab!=='inefficiencies'&&tab!=='summary'&&tab!=='campmgmt')||!config)return;
    if(ineffCampRaw.length>0||ineffMainLoading)return; // already loaded/loading
    setIneffMainLoading(true);setIneffMainError('');
    Promise.all([
      fetchInsights(config.token,config.accountId,'campaign',w14From,curTo),
      fetchInsights(config.token,config.accountId,'adset',w14From,curTo),
    ]).then(([campData,adsetData])=>{
      const camps=campData.map(r=>{const p=parseMetaRow(r);return{id:r.campaign_id||'',name:r.campaign_name,day:r.date_start,spend:p.spend,purch:p.purchases,rev:p.revenue,atc:p.atc,lpv:p.lpv};});
      const adsets=adsetData.map(r=>{const p=parseMetaRow(r);return{id:r.adset_id||'',name:r.adset_name||'Unknown',campaign:r.campaign_name||'',day:r.date_start,spend:p.spend,purch:p.purchases,rev:p.revenue,atc:p.atc,lpv:p.lpv};});
      setIneffCampRaw(camps);setIneffAdsetRaw(adsets);setIneffMainLoading(false);
    }).catch(e=>{setIneffMainError(e.message);setIneffMainLoading(false);});
  },[tab,config,w14From,curTo,ineffCampRaw.length,ineffMainLoading]);

  // Reset ineff campaign/adset cache when date window changes
  useEffect(()=>{setIneffCampRaw([]);setIneffAdsetRaw([]);},[w14From,curTo]);

  // Lazy-fetch active campaigns + adsets WITH metadata (budget, bid strategy)
  // for Campaign Mgmt tab + Save Reports button (Summary tab also needs it).
  useEffect(()=>{
    if((tab!=='campmgmt'&&tab!=='summary')||!config)return;
    if(campMgmtCampsMeta!==null||campMgmtLoading)return;
    setCampMgmtLoading(true);setCampMgmtError('');
    Promise.all([
      fetchActiveCampaignsMeta(config.token,config.accountId),
      fetchActiveAdsetsMeta(config.token,config.accountId),
    ]).then(([camps,adsets])=>{
      setCampMgmtCampsMeta(camps);setCampMgmtAdsetsMeta(adsets);setCampMgmtLoading(false);
    }).catch(e=>{setCampMgmtError(e.message);setCampMgmtLoading(false);});
  },[tab,config,campMgmtCampsMeta,campMgmtLoading]);

  // Also trigger the existing ineff camp/adset insights fetch on campmgmt tab
  // (for p7d + today/prior insights). Existing effect already covers summary
  // and inefficiencies — we just need it to fire on campmgmt too.

  // Lazy-fetch active entity IDs (campaigns + adsets + ads, in parallel)
  // used by Inefficiencies to exclude paused/archived entries.
  useEffect(()=>{
    if((tab!=='inefficiencies'&&tab!=='summary'&&tab!=='campmgmt')||!config)return;
    if(activeAdIds!==null||activeAdsLoading)return; // already loaded/loading
    setActiveAdsLoading(true);setActiveAdsError('');
    Promise.all([
      fetchActiveCampaignIds(config.token,config.accountId),
      fetchActiveAdsetIds(config.token,config.accountId),
      fetchActiveAdIds(config.token,config.accountId),
    ]).then(([camps,adsets,ads])=>{
      setActiveCampIds(camps);setActiveAdsetIds(adsets);setActiveAdIds(ads);
      setActiveAdsLoading(false);
    }).catch(e=>{setActiveAdsError(e.message);setActiveAdsLoading(false);});
  },[tab,config,activeAdIds,activeAdsLoading]);

  // Inefficiency filter: p7d ROAS < 0.5 AND p7d spend >= $250, ACTIVE only,
  // p14d spend > p7d spend (= had spend in days 8-14, excludes brand-new
  // entities that only spent in the last week), sorted by p7d spend desc
  const ineffCamps=useMemo(()=>{
    if(activeCampIds===null)return[]; // wait until active-status set is loaded
    const g={};
    for(const r of ineffCampRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    return Object.entries(g).map(([n,rows])=>({n,id:rows[0]?.id||'',...aggregateIneff(rows)}))
      .filter(r=>r.p7.s>=250&&r.p7.roas<0.5&&activeCampIds.has(r.id)&&r.p14.s>r.p7.s+0.01)
      .sort((a,b)=>b.p7.s-a.p7.s);
  },[ineffCampRaw,aggregateIneff,activeCampIds]);

  const ineffAdsets=useMemo(()=>{
    if(activeAdsetIds===null)return[]; // wait until active-status set is loaded
    const g={};
    for(const r of ineffAdsetRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    return Object.entries(g).map(([n,rows])=>({n,id:rows[0]?.id||'',campaign:rows[0]?.campaign||'',...aggregateIneff(rows)}))
      .filter(r=>r.p7.s>=250&&r.p7.roas<0.5&&activeAdsetIds.has(r.id)&&r.p14.s>r.p7.s+0.01)
      .sort((a,b)=>b.p7.s-a.p7.s);
  },[ineffAdsetRaw,aggregateIneff,activeAdsetIds]);

  // Step 1: candidates from main adLevelRaw using p7d filter, scoped to ACTIVE ads only
  const ineffAdCandidates=useMemo(()=>{
    if(activeAdIds===null)return[]; // wait until active-status set is loaded
    const g={};
    for(const r of adLevelRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    const sumP7=(rows)=>{let s=0,p=0,r=0,a=0,l=0;for(const x of rows){if(x.day>=w7From&&x.day<=curTo){s+=x.spend;p+=x.purch;r+=x.rev;a+=x.atc;l+=x.lpv;}}return{s,p,roas:s>0?r/s:0,cpa:p>0?s/p:null,atc:l>0?a/l*100:0,cvr:l>0?p/l*100:0};};
    return Object.entries(g).map(([n,rows])=>({n,adId:rows[0]?.adId||'',adset:rows[0]?.adset||'',campaign:rows[0]?.campaign||'',p7:sumP7(rows)}))
      .filter(r=>r.p7.s>=250&&r.p7.roas<0.5&&activeAdIds.has(r.adId))
      .sort((a,b)=>b.p7.s-a.p7.s);
  },[adLevelRaw,w7From,curTo,activeAdIds]);

  // Snapshot mode: ineffAdLongRaw is already populated by fetchData from
  // the 14-day ads-insights snapshot. No secondary Meta fetch needed.
  // (Effect kept as no-op for shape compatibility; if snapshot ever fails,
  // we'd fall back to direct Meta fetch here.)

  // Combine p7 (from candidates) with p14 (from snapshot ad rows). Also
  // applies the p14 > p7 filter to drop brand-new ads that only spent
  // in the last 7 days (no historical context to judge "inefficiency").
  const ineffAds=useMemo(()=>{
    if(ineffAdCandidates.length===0)return[];
    const longByName={};
    for(const r of ineffAdLongRaw){const k=r.ad_name||'Unknown';if(!longByName[k])longByName[k]=[];longByName[k].push(r);}
    const sumRange=(rows,from,to)=>{let s=0,p=0,r=0,a=0,l=0;for(const x of rows){if(x.date_start>=from&&x.date_start<=to){const parsed=parseMetaRow(x);s+=parsed.spend;p+=parsed.purchases;r+=parsed.revenue;a+=parsed.atc;l+=parsed.lpv;}}return{s,p,roas:s>0?r/s:0,cpa:p>0?s/p:null,atc:l>0?a/l*100:0,cvr:l>0?p/l*100:0};};
    return ineffAdCandidates.map(c=>{
      const longRows=longByName[c.n]||[];
      return{
        ...c,
        p14: longRows.length?sumRange(longRows,w14From,curTo):{s:null,p:null,roas:null,cpa:null,atc:null,cvr:null},
      };
    }).filter(r=>r.p14&&r.p14.s!=null&&r.p14.s>r.p7.s+0.01);
  },[ineffAdCandidates,ineffAdLongRaw,w14From,curTo]);

  // Budget Tankers: ads taking >75% of their adset's CURRENT-period spend
  // AND with current-period ROAS < 0.7. Shows current vs prior period
  // (not p7d/p14d like the other inefficiency tables). Uses unfiltered
  // ineffAdsetRaw so we cover all adsets, not just _MT.
  const budgetTankers=useMemo(()=>{
    if(activeAdIds===null||adLevelRaw.length===0||ineffAdsetRaw.length===0)return [];
    // Per-adset current + prior period spend
    const adsetD2={},adsetD1={};
    for(const r of ineffAdsetRaw){
      if(r.day>=curFrom&&r.day<=curTo) adsetD2[r.name]=(adsetD2[r.name]||0)+r.spend;
      if(r.day>=priFrom&&r.day<=priTo) adsetD1[r.name]=(adsetD1[r.name]||0)+r.spend;
    }
    // Group ads by name and compute d2/d1
    const sumRange=(rows,from,to)=>{let s=0,p=0,rev=0;for(const x of rows){if(x.day>=from&&x.day<=to){s+=x.spend;p+=x.purch;rev+=x.rev;}}return{s,p,roas:s>0?rev/s:0,cpa:p>0?s/p:null};};
    const g={};
    for(const r of adLevelRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    // Past 3 days window ending at curTo
    const p3From=(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-2);return fmt(d);})();
    const out=[];
    for(const [n,rows] of Object.entries(g)){
      const adId=rows[0]?.adId||'';
      if(!activeAdIds.has(adId))continue;
      const adsetName=rows[0]?.adset||'';
      const d2=sumRange(rows,curFrom,curTo);
      const d1=sumRange(rows,priFrom,priTo);
      if(d2.s<200||d2.roas>=0.7)continue; // min $200 current-period spend
      const adsetD2Spend=adsetD2[adsetName]||0;
      if(adsetD2Spend<=0)continue;
      const ratio=d2.s/adsetD2Spend;
      if(ratio<0.75)continue;
      const p3=sumRange(rows,p3From,curTo);
      out.push({
        n, adId,
        adset: adsetName,
        campaign: rows[0]?.campaign||'',
        d2, d1, p3,
        adsetD2: adsetD2Spend,
        adsetD1: adsetD1[adsetName]||0,
        ratio,
      });
    }
    return out.sort((a,b)=>b.d2.s-a.d2.s);
  },[adLevelRaw,ineffAdsetRaw,activeAdIds,curFrom,curTo,priFrom,priTo]);

  // Yesterday's p7d inefficiency counts — for Red Alert day-over-day
  const ineffYesterdayCounts=useMemo(()=>{
    const sum=(rows,from,to)=>{let s=0,r=0;for(const x of rows){if(x.day>=from&&x.day<=to){s+=x.spend;r+=x.rev;}}return{s,roas:s>0?r/s:0};};
    const countIneff=(rawRows,idField,activeSet)=>{
      if(activeSet===null)return null;
      const g={};
      for(const r of rawRows){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
      let n=0;
      for(const rows of Object.values(g)){
        const id=rows[0]?.[idField]||'';
        if(!activeSet.has(id))continue;
        const agg=sum(rows,p7YestFrom,p7YestTo);
        if(agg.s>=250&&agg.roas<0.5)n++;
      }
      return n;
    };
    // For ads, the raw data uses different shape (day vs date_start) — inline variant
    const countIneffAds=()=>{
      if(activeAdIds===null)return null;
      const g={};
      for(const r of adLevelRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
      let n=0;
      for(const rows of Object.values(g)){
        const adId=rows[0]?.adId||'';
        if(!activeAdIds.has(adId))continue;
        const agg=sum(rows,p7YestFrom,p7YestTo);
        if(agg.s>=250&&agg.roas<0.5)n++;
      }
      return n;
    };
    return{
      camps: countIneff(ineffCampRaw,'id',activeCampIds),
      adsets: countIneff(ineffAdsetRaw,'id',activeAdsetIds),
      ads: countIneffAds(),
    };
  },[ineffCampRaw,ineffAdsetRaw,adLevelRaw,activeCampIds,activeAdsetIds,activeAdIds,p7YestFrom,p7YestTo]);

  // CSV export for inefficiencies tables
  const exportIneffCSV=useCallback((rows,level,filename)=>{
    const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
    const baseHdr=[level==='campaign'?'Campaign':level==='adset'?'Adset':'Ad Name'];
    if(level==='adset')baseHdr.push('Campaign');
    if(level==='ad')baseHdr.push('Adset','Campaign');
    const hdr=[...baseHdr,'Spend (7d)','Spend (14d)','Purch (7d)','Purch (14d)','ROAS (7d)','ROAS (14d)','CPA (7d)','CPA (14d)'];
    const csvRows=rows.map(r=>{
      const base=[r.n];
      if(level==='adset')base.push(r.campaign||'');
      if(level==='ad')base.push(r.adset||'',r.campaign||'');
      const p14s=r.p14?.s,p14p=r.p14?.p,p14r=r.p14?.roas,p14c=r.p14?.cpa;
      return[...base,
        r.p7.s.toFixed(2),p14s!=null?p14s.toFixed(2):'',
        Math.round(r.p7.p),p14p!=null?Math.round(p14p):'',
        r.p7.roas.toFixed(2),p14r!=null?p14r.toFixed(2):'',
        r.p7.cpa!=null?r.p7.cpa.toFixed(2):'',p14c!=null?p14c.toFixed(2):'',
      ].map(esc);
    });
    const csv=[hdr.join(','),...csvRows.map(r=>r.join(','))].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();
    URL.revokeObjectURL(url);
  },[]);

  // Gold Mine: >10 purchases AND >1.0x ROAS in 7-day window
  const goldMineAds=useMemo(()=>adD.filter(r=>r.w7&&r.w7.p>10&&r.w7.roas>1.0).sort((a,b)=>(b.d2?.roas||0)-(a.d2?.roas||0)),[adD]);
  // Volume Scaler: >$1k average daily spend in current period
  const curDays=useMemo(()=>{const d1=new Date(curFrom+'T12:00:00'),d2=new Date(curTo+'T12:00:00');return Math.max(1,Math.round((d2-d1)/(86400000))+1);},[curFrom,curTo]);
  const volumeAds=useMemo(()=>adD.filter(r=>r.d2&&(r.d2.s/curDays)>=1000).sort((a,b)=>b.d2.s-a.d2.s),[adD,curDays]);

  // Format breakdowns for summaries
  const formatBreakdown=(adList)=>{
    const g={};
    for(const ad of adList){
      const fmt=ad.format||'Untagged';
      if(!g[fmt])g[fmt]={ads:0,s:0,p:0,r:0,a:0,l:0};
      g[fmt].ads++;g[fmt].s+=ad.tot.s;g[fmt].p+=ad.tot.p;
      // Sum revenue from raw data for ROAS calc
      const rawRows=adLevelRaw.filter(r=>r.name===ad.n);
      for(const rr of rawRows){g[fmt].r+=rr.rev;g[fmt].a+=rr.atc;g[fmt].l+=rr.lpv;}
    }
    return Object.entries(g).map(([n,v])=>({n,ads:v.ads,s:v.s,p:v.p,roas:v.s>0?v.r/v.s:0,cpa:v.p>0?v.s/v.p:null,atc:v.l>0?v.a/v.l*100:0,cvr:v.l>0?v.p/v.l*100:0})).sort((a,b)=>b.s-a.s);
  };
  const goldMineFmts=useMemo(()=>formatBreakdown(goldMineAds),[goldMineAds,adLevelRaw]);
  const volumeFmts=useMemo(()=>formatBreakdown(volumeAds),[volumeAds,adLevelRaw]);

  // All persona/format options for tagging
  // Fetch thumbnails for ads visible on relevant tabs
  useEffect(()=>{
    if(!config||(tab!=='ads'&&tab!=='snapshot'&&tab!=='inefficiencies'&&tab!=='summary')||adLevelRaw.length===0)return;
    if(tab==='inefficiencies'){
      const visible=ineffAds.slice(0,ineffAdLimit);
      const needIds=visible.map(a=>a.adId).filter(id=>id&&!creatives[id]);
      if(needIds.length>0)fetchAdCreatives(config.token,[...new Set(needIds)]).then(cr=>setCreatives(cr)).catch(()=>{});
      return;
    }
    if(tab==='summary'){
      // Top 10 inefficient ads (for Summary section thumbnails)
      const visible=ineffAds.slice(0,10);
      const needIds=visible.map(a=>a.adId).filter(id=>id&&!creatives[id]);
      if(needIds.length>0)fetchAdCreatives(config.token,[...new Set(needIds)]).then(cr=>setCreatives(cr)).catch(()=>{});
      return;
    }
    if(tab==='snapshot'){
      if(!snapApplied)return;
      const fl=snapApplied.toLowerCase();
      const snapAds=adD.filter(a=>a.n.toLowerCase().includes(fl));
      const needIds=snapAds.map(a=>a.adId).filter(id=>id&&!creatives[id]);
      if(needIds.length>0)fetchAdCreatives(config.token,[...new Set(needIds)]).then(cr=>setCreatives(cr)).catch(()=>{});
      return;
    }
    const visibleAds=[...goldMineAds.slice(0,goldMineLimit),...volumeAds.slice(0,volumeLimit)];
    const needIds=visibleAds.map(a=>a.adId).filter(id=>id&&!creatives[id]);
    if(needIds.length>0){
      fetchAdCreatives(config.token,[...new Set(needIds)]).then(cr=>setCreatives(cr)).catch(()=>{});
    }
  },[tab,goldMineAds,volumeAds,goldMineLimit,volumeLimit,adD,snapApplied]);

  // On-click preview: fetch single ad creative and open preview
  const handlePreview=useCallback(async(adId)=>{
    if(!config||!adId)return;
    let cr=creatives[adId];
    if(!cr){
      try{
        const updated=await fetchAdCreatives(config.token,[adId]);
        setCreatives(updated);
        cr=updated[adId];
      }catch(e){return;}
    }
    if(cr?.preview)window.open(cr.preview,'_blank');
    else alert('No preview available for this ad.');
  },[config,creatives]);

  // CSV export for ad reports
  const exportCSV=useCallback(async(adList,filename)=>{
    // Fetch preview links for all ads in the list
    const ids=adList.map(a=>a.adId).filter(Boolean);
    let cr={...creatives};
    const missing=ids.filter(id=>!cr[id]);
    if(missing.length>0&&config){
      try{cr=await fetchAdCreatives(config.token,[...new Set(missing)]);setCreatives(cr);}catch(e){}
    }
    const esc=v=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
    const hdr=['Ad Name','Preview Link','Spend','Purchases','ROAS','CPA','ATC%','CVR%','Persona','Format'];
    const rows=adList.map(r=>{
      const link=cr[r.adId]?.preview||'';
      return[r.n,link,r.d2?.s!=null?r.d2.s.toFixed(2):'',r.d2?.p!=null?Math.round(r.d2.p):'',r.d2?.roas!=null?r.d2.roas.toFixed(2):'',r.d2?.cpa!=null?r.d2.cpa.toFixed(2):'',r.d2?.atc!=null?r.d2.atc.toFixed(1):'',r.d2?.cvr!=null?r.d2.cvr.toFixed(2):'',r.persona||'',r.format||''].map(esc);
    });
    const csv=[hdr.join(','),...rows.map(r=>r.join(','))].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename+'.csv';a.click();
    URL.revokeObjectURL(url);
  },[config,creatives]);

  const allPersonas=useMemo(()=>[...new Set(adD.map(a=>a.persona))].sort(),[adD]);
  const allFormats=useMemo(()=>[...new Set(adD.map(a=>a.format))].sort(),[adD]);

  // ═══ SUMMARY TAB DATA ════════════════════════════════════════════════════
  // S1: High Potential Campaigns — ROAS > 0.9 in current OR 7d
  const sumCamps=useMemo(()=>campD.filter(r=>(r.d2&&r.d2.roas>0.9)||(r.w7&&r.w7.roas>0.9)).sort((a,b)=>(b.d2?.roas||0)-(a.d2?.roas||0)),[campD]);
  // S2: Scaling Ad Funnels — description contains "scale" (case-insensitive)
  const sumScaling=useMemo(()=>angD.filter(r=>{const nk='angles::'+r.n;return notes[nk]&&/scale/i.test(notes[nk]);}).filter(r=>r.d2&&r.d2.s>0).sort((a,b)=>(b.d2?.s||0)-(a.d2?.s||0)),[angD,notes]);
  // S3: High Potential Ad Funnels — ROAS > 0.9 AND blank description
  const sumHighAngles=useMemo(()=>angD.filter(r=>{const nk='angles::'+r.n;return r.d2&&r.d2.roas>0.9&&!notes[nk];}).sort((a,b)=>(b.d2?.s||0)-(a.d2?.s||0)),[angD,notes]);
  // S5: Top 10 Landing Pages by purchases, tiebreaker = ROAS
  const sumTopLanders=useMemo(()=>{
    const sorted=lnD.filter(r=>r.d2&&r.d2.p>0).sort((a,b)=>(b.d2?.p||0)-(a.d2?.p||0)||(b.d2?.roas||0)-(a.d2?.roas||0));
    return sorted.slice(0,10);
  },[lnD]);
  // S6: Top 10 Gold Mine ads by purchases, include ties
  const sumGoldMine=useMemo(()=>{

    if(sorted.length<=10)return sorted;
    const cutoff=sorted[9]?.d2?.p||0;
    return sorted.filter((r,i)=>i<10||r.d2?.p===cutoff);
  },[goldMineAds]);
  // S7: Top 10 Volume Scaler ads by purchases, include ties
  const sumVolume=useMemo(()=>{
    const sorted=volumeAds.filter(r=>r.d2&&r.d2.p>0).sort((a,b)=>(b.d2?.p||0)-(a.d2?.p||0)||(b.d2?.roas||0)-(a.d2?.roas||0));
    if(sorted.length<=10)return sorted;
    const cutoff=sorted[9]?.d2?.p||0;
    return sorted.filter((r,i)=>i<10||r.d2?.p===cutoff);
  },[volumeAds]);

  // ═══ DAILY ACTION ITEMS (Summary card) ════════════════════════════════════
  // 1. Scale Up Today: ALL active campaigns with today's spend > 0 AND today's ROAS >= 1.0x
  //    (sourced from ineffCampRaw so we include non-_MT campaigns too)
  const actionScaleUp=useMemo(()=>{
    if(activeCampIds===null||ineffCampRaw.length===0)return [];
    const g={};
    for(const r of ineffCampRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    const sum=(rows,from,to)=>{let s=0,p=0,rev=0;for(const x of rows){if(x.day>=from&&x.day<=to){s+=x.spend;p+=x.purch;rev+=x.rev;}}return{s,p,roas:s>0?rev/s:0};};
    const dayBefore=(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-1);return fmt(d);})();
    const out=[];
    for(const [n,rows] of Object.entries(g)){
      const id=rows[0]?.id||'';
      if(!activeCampIds.has(id))continue;
      const d2=sum(rows,curTo,curTo);
      if(d2.s<=0||d2.roas<1.0)continue;
      const d1=sum(rows,dayBefore,dayBefore);
      out.push({n,d2,d1});
    }
    return out.sort((a,b)=>b.d2.s-a.d2.s);
  },[ineffCampRaw,activeCampIds,curTo]);
  // 2. Scaling Funnels Picking Up: scale-tagged angles with today's ROAS > 0.8x
  const actionScalingUp=useMemo(()=>sumScaling.filter(r=>r.d2&&r.d2.roas>0.8).sort((a,b)=>(b.d2?.s||0)-(a.d2?.s||0)),[sumScaling]);
  // 2.5 Scaling Funnels NOT Picking Up: scale-tagged angles with today's ROAS < 0.8x
  const actionScalingDown=useMemo(()=>sumScaling.filter(r=>r.d2&&r.d2.roas<0.8).sort((a,b)=>(b.d2?.s||0)-(a.d2?.s||0)),[sumScaling]);
  // 3. Top 3 Landers by today's CVR (min $250 spend today to filter noise)
  const actionTopCvrLanders=useMemo(()=>lnD.filter(r=>r.d2&&r.d2.s>=250&&r.d2.cvr>0).sort((a,b)=>(b.d2?.cvr||0)-(a.d2?.cvr||0)).slice(0,3),[lnD]);
  // 3.5 Top Spend Landers with <1% CVR — waste at lander level
  const actionLowCvrLanders=useMemo(()=>lnD.filter(r=>r.d2&&r.d2.s>0&&r.d2.cvr<1.0).sort((a,b)=>(b.d2?.s||0)-(a.d2?.s||0)),[lnD]);

  // Build Daily Action Items as plaintext for copy-to-clipboard
  const buildDailyActionItemsText=useCallback(()=>{
    const fmtS=v=>v!=null?'$'+Math.round(v).toLocaleString():'\u2014';
    const fmtX=v=>v!=null?v.toFixed(2)+'x':'\u2014';
    const fmtPct=v=>v!=null?v.toFixed(2)+'%':'\u2014';
    const fmtN=v=>v!=null?Math.round(v).toLocaleString():'\u2014';
    const SEP='\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501\u2501';
    const L=[];
    const dateLabel=new Date(curTo+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
    L.push('\uD83D\uDCCB IM8 Daily Action Items \u2014 '+dateLabel);
    L.push(SEP);

    // Trend arrow helper (only show when there's a clear direction)
    const arrow=(cur,prev)=>{if(cur==null||prev==null)return '';const d=cur-prev;if(Math.abs(d)<0.001)return '';return d>0?' \u2191':' \u2193';};

    if(actionScaleUp.length>0){
      L.push(''); L.push('\u25B2 SCALE UP TODAY ('+actionScaleUp.length+')');
      L.push('All active campaigns \u2014 today\u2019s ROAS \u2265 1.0x'); L.push('');
      actionScaleUp.forEach((c,i)=>{
        L.push((i+1)+'. '+c.n);
        L.push('   '+fmtX(c.d2?.roas)+arrow(c.d2?.roas,c.d1?.roas)+' (was '+fmtX(c.d1?.roas)+') \u00B7 '+fmtS(c.d2?.s));
      });
      L.push(''); L.push(SEP);
    }

    if(actionScalingUp.length>0){
      L.push(''); L.push('\u26A1 SCALING FUNNELS PICKING UP ('+actionScalingUp.length+')');
      L.push('Scale-tagged angles \u2014 today\u2019s ROAS > 0.8x'); L.push('');
      actionScalingUp.forEach((a,i)=>{
        L.push((i+1)+'. '+a.n);
        const desc=notes['angles::'+a.n];
        if(desc) L.push('   "'+desc+'"');
        L.push('   ROAS '+fmtX(a.d2?.roas)+arrow(a.d2?.roas,a.d1?.roas)+' (was '+fmtX(a.d1?.roas)+')');
        L.push('   Spend '+fmtS(a.d2?.s)+arrow(a.d2?.s,a.d1?.s)+' (was '+fmtS(a.d1?.s)+')');
      });
      L.push(''); L.push(SEP);
    }

    if(actionScalingDown.length>0){
      L.push(''); L.push('\u26A0 NOT PICKING UP ('+actionScalingDown.length+')');
      L.push('Scale-tagged angles \u2014 today\u2019s ROAS < 0.8x'); L.push('');
      actionScalingDown.forEach((a,i)=>{
        L.push((i+1)+'. '+a.n);
        const desc=notes['angles::'+a.n];
        if(desc) L.push('   "'+desc+'"');
        L.push('   ROAS '+fmtX(a.d2?.roas)+arrow(a.d2?.roas,a.d1?.roas)+' (was '+fmtX(a.d1?.roas)+')');
        L.push('   Spend '+fmtS(a.d2?.s)+arrow(a.d2?.s,a.d1?.s)+' (was '+fmtS(a.d1?.s)+')');
      });
      L.push(''); L.push(SEP);
    }

    if(actionTopCvrLanders.length>0){
      L.push(''); L.push('\uD83C\uDFAF TOP 3 LANDERS BY CVR');
      L.push('Min $250 spend today'); L.push('');
      actionTopCvrLanders.forEach((l,i)=>{
        L.push((i+1)+'. '+l.n);
        const desc=notes['landers::'+l.n];
        if(desc) L.push('   "'+desc+'"');
        L.push('   '+fmtPct(l.d2?.cvr)+' CVR \u00B7 '+fmtS(l.d2?.s)+' \u00B7 '+fmtN(l.d2?.p)+' purch');
      });
      L.push(''); L.push(SEP);
    }

    if(actionLowCvrLanders.length>0){
      L.push(''); L.push('\uD83D\uDCB8 TOP SPEND, LOW CVR ('+actionLowCvrLanders.length+')');
      L.push('Landers with CVR < 1.0% today'); L.push('');
      actionLowCvrLanders.forEach((l,i)=>{
        L.push((i+1)+'. '+l.n);
        const desc=notes['landers::'+l.n];
        if(desc) L.push('   "'+desc+'"');
        L.push('   '+fmtS(l.d2?.s)+' \u00B7 '+fmtPct(l.d2?.cvr)+' CVR \u00B7 '+fmtN(l.d2?.p)+' purch');
      });
      L.push(''); L.push(SEP);
    }

    // Red Alert (always included)
    L.push(''); L.push('\uD83D\uDEA8 RED ALERT MONITORING');
    L.push('p7d ROAS < 0.5x \u00B7 $250+ spend \u00B7 ACTIVE only'); L.push('');
    const tC=ineffCamps.length, tA=ineffAdsets.length, tAd=ineffAds.length;
    const yC=ineffYesterdayCounts.camps, yA=ineffYesterdayCounts.adsets, yAd=ineffYesterdayCounts.ads;
    L.push('Today:     '+tC+' camps \u00B7 '+tA+' adsets \u00B7 '+tAd+' ads');
    L.push('Yesterday: '+(yC==null?'\u2026':yC)+' camps \u00B7 '+(yA==null?'\u2026':yA)+' adsets \u00B7 '+(yAd==null?'\u2026':yAd)+' ads');
    if(yC!=null&&yA!=null&&yAd!=null){
      const dc=tC-yC, da=tA-yA, dad=tAd-yAd;
      const sgn=d=>d>0?'+':'';
      L.push('Delta:     '+sgn(dc)+dc+' camp \u00B7 '+sgn(da)+da+' adsets \u00B7 '+sgn(dad)+dad+' ads');
    }
    if(ineffCamps.length>0){
      L.push(''); L.push('Top offenders (p7d):');
      ineffCamps.slice(0,3).forEach((c,i)=>{
        L.push((i+1)+'. '+c.n);
        L.push('   '+fmtS(c.p7?.s)+' \u00B7 '+fmtX(c.p7?.roas));
      });
    }
    L.push(''); L.push('Full list \u2192 joshkong-shadow.github.io/im8-dashboard');

    // Footer with MYT timestamp
    L.push(''); L.push(SEP);
    const now=new Date();
    const mytMs=now.getTime()+(8*60*60*1000)+(now.getTimezoneOffset()*60*1000);
    const myt=new Date(mytMs);
    const pad=n=>String(n).padStart(2,'0');
    const ts=myt.getFullYear()+'-'+pad(myt.getMonth()+1)+'-'+pad(myt.getDate())+' '+pad(myt.getHours())+':'+pad(myt.getMinutes());
    L.push('Generated '+ts+' MYT');

    return L.join('\n');
  },[curTo,actionScaleUp,actionScalingUp,actionScalingDown,actionTopCvrLanders,actionLowCvrLanders,ineffCamps,ineffAdsets,ineffAds,ineffYesterdayCounts,notes]);

  // ═══ CAMPAIGN MANAGEMENT TAB DATA ═══════════════════════════════════════
  // Friendly bid strategy labels
  const bidStrategyLabel=(raw)=>{
    const m={
      'LOWEST_COST_WITHOUT_CAP':'High Volume',
      'LOWEST_COST_WITH_BID_CAP':'Bid Cap',
      'COST_CAP':'Cost Cap',
      'LOWEST_COST_WITH_MIN_ROAS':'Min ROAS',
    };
    return m[raw]||raw||'—';
  };

  // Computes per-campaign daily_budget: campaign-level if set, else sum of adset-level
  const campaignBudgetMap=useMemo(()=>{
    if(campMgmtCampsMeta===null)return {};
    const adsetByCamp={};
    for(const a of (campMgmtAdsetsMeta||[])){
      const cid=a.campaign_id;
      if(!cid)continue;
      const b=parseInt(a.daily_budget||'0',10);
      if(!Number.isFinite(b))continue;
      adsetByCamp[cid]=(adsetByCamp[cid]||0)+b;
    }
    const out={};
    for(const c of campMgmtCampsMeta){
      const campBudget=parseInt(c.daily_budget||'0',10);
      out[c.id]={
        budget: campBudget>0 ? campBudget/100 : (adsetByCamp[c.id]||0)/100,  // cents → dollars
        bidStrategy: bidStrategyLabel(c.bid_strategy),
        name: c.name,
      };
    }
    return out;
  },[campMgmtCampsMeta,campMgmtAdsetsMeta]);

  // Main Campaign Mgmt list: today/prior/p7d per campaign, ACTIVE + today spend > 0
  const campMgmtList=useMemo(()=>{
    if(campMgmtCampsMeta===null||ineffCampRaw.length===0)return [];
    const g={};
    for(const r of ineffCampRaw){const k=r.name;if(!g[k])g[k]=[];g[k].push(r);}
    const sumRange=(rows,from,to)=>{
      let s=0,p=0,rev=0;
      for(const x of rows){if(x.day>=from&&x.day<=to){s+=x.spend;p+=x.purch;rev+=x.rev;}}
      return{s,p,roas:s>0?rev/s:0,cpp:p>0?s/p:null};
    };
    const out=[];
    for(const c of campMgmtCampsMeta){
      const rows=g[c.name]||[];
      const d2=sumRange(rows,curTo,curTo);
      if(d2.s<=0)continue; // skip no-spend campaigns
      const d1=sumRange(rows,(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-1);return fmt(d);})(),(()=>{const d=new Date(curTo+'T12:00:00');d.setDate(d.getDate()-1);return fmt(d);})());
      // p7d including today (curTo-6 to curTo)
      const p7=sumRange(rows,w7From,curTo);
      const budgetInfo=campaignBudgetMap[c.id]||{budget:0,bidStrategy:'—'};
      out.push({
        id:c.id, name:c.name,
        budget:budgetInfo.budget, bidStrategy:budgetInfo.bidStrategy,
        d2, d1, p7,
      });
    }
    return out.sort((a,b)=>b.d2.s-a.d2.s);
  },[campMgmtCampsMeta,ineffCampRaw,curTo,w7From,campaignBudgetMap]);

  // Header overview totals
  const campMgmtOverview=useMemo(()=>{
    let s2=0,p2=0,r2=0,s1=0,p1=0,r1=0;
    for(const c of campMgmtList){
      s2+=c.d2.s; p2+=c.d2.p; r2+=c.d2.s*c.d2.roas;
      s1+=c.d1.s; p1+=c.d1.p; r1+=c.d1.s*c.d1.roas;
    }
    return{
      d2:{s:s2,p:p2,roas:s2>0?r2/s2:0,cpp:p2>0?s2/p2:null},
      d1:{s:s1,p:p1,roas:s1>0?r1/s1:0,cpp:p1>0?s1/p1:null},
    };
  },[campMgmtList]);

  // Insight cross-references per campaign
  const campMgmtInsights=useMemo(()=>{
    // Map campaign name -> set of angle names whose adsets live inside it
    const campToAngles={};
    for(const a of adsetRaw){
      if(!/_ALT/.test(a.name))continue;
      const angle=(ov[a.name]||{}).angle||autoAngle(a.name);
      if(!campToAngles[a.campaign])campToAngles[a.campaign]=new Set();
      campToAngles[a.campaign].add(angle);
    }
    const ineffCampNames=new Set(ineffCamps.map(c=>c.n));
    const result={};
    for(const c of campMgmtList){
      const badges=[];
      // Scaling angle present
      const angles=campToAngles[c.name]||new Set();
      for(const angle of angles){
        const desc=notes['angles::'+angle];
        if(desc&&/scale/i.test(desc)){badges.push({type:'scaling',label:'\u26A1 Scaling Angle Present',color:'#a78bfa'});break;}
      }
      // Scale-up candidate
      if(c.d2.roas>=1.0&&c.d1&&c.d2.roas>c.d1.roas){
        badges.push({type:'scaleup',label:'\u25B2 Scale-Up Candidate',color:'#34d399'});
      }
      // Red alert
      if(ineffCampNames.has(c.name)){
        badges.push({type:'redalert',label:'\uD83D\uDEA8 In Red Alert',color:'#f87171'});
      }
      result[c.name]=badges;
    }
    return result;
  },[campMgmtList,adsetRaw,ov,notes,ineffCamps]);

  // Strategic recommendation from guardrails
  const recommendationFor=(roas,upper,lower)=>{
    const u=parseFloat(upper),l=parseFloat(lower);
    if(!Number.isFinite(u)||!Number.isFinite(l))return 'Set guardrails to see recommendation';
    if(roas>=u)return 'Scale up budget (ROAS \u2265 '+u.toFixed(2)+'x)';
    if(roas<l)return 'Drop budget (ROAS < '+l.toFixed(2)+'x)';
    return 'Hold';
  };

  // Save guardrails to localStorage
  useEffect(()=>{LS.set('scale_roas_upper',scaleRoasUpper);},[scaleRoasUpper]);
  useEffect(()=>{LS.set('scale_roas_lower',scaleRoasLower);},[scaleRoasLower]);

  // Build text report for copy-to-clipboard
  const buildCampMgmtText=useCallback(()=>{
    const fmtS=v=>v!=null?'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'\u2014';
    const fmtSint=v=>v!=null?'$'+Math.round(v).toLocaleString():'\u2014';

    const dayBeforeD=new Date(curTo+'T12:00:00');dayBeforeD.setDate(dayBeforeD.getDate()-1);

    L.push('');
    L.push('\uD83D\uDCCA Overview');
    L.push('\uD83D\uDCB0 Meta Spend: '+fmtS(campMgmtOverview.d2.s)+' ('+fmtS(campMgmtOverview.d1.s)+')');
    L.push('\uD83D\uDCC8 Meta ROAS: '+fmtX(campMgmtOverview.d2.roas)+' ('+fmtX(campMgmtOverview.d1.roas)+') '+roasDot(campMgmtOverview.d2.roas));
    L.push('\uD83D\uDCCA Meta CPP: '+fmtS(campMgmtOverview.d2.cpp)+' ('+fmtS(campMgmtOverview.d1.cpp)+')');

      L.push((i+1)+'. '+c.name);

      L.push('•  Purchases: '+fmtN(c.d2.p)+' ('+fmtN(c.d1.p)+')');
      L.push('•  CPP: '+fmtS(c.d2.cpp)+' ('+fmtS(c.d1.cpp)+') '+cppDot(c.d2.cpp,c.d1.cpp)+' [L7D CPP: '+fmtS(c.p7.cpp)+']');

      L.push('');

    return L.join('\n').replace(/\n+$/,'');
  },[campMgmtList,campMgmtOverview,campMgmtInsights,config,curTo,scaleRoasUpper,scaleRoasLower]);

  const handleCopyCampMgmt=useCallback(async()=>{

  // Campaign drill-down: adsets belonging to clicked campaign
  const campDrillData=useMemo(()=>{
    if(!campDrill)return[];
    const matchingRaw=campRaw.filter(r=>r.name===campDrill);
    const rawNames=new Set(matchingRaw.map(r=>r.rawName));
    const matchingAdsets=adsetRaw.filter(r=>rawNames.has(r.campaign));
