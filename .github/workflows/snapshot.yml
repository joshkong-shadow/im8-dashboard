name: Meta Data Snapshot

on:
  schedule:
    # 7am/11am/3pm/9pm MYT (1h earlier to compensate for GitHub's ~1.5h cron delay)
    # = 23:00/03:00/07:00/13:00 UTC → arrives ~8:30am/12:30pm/4:30pm/10:30pm MYT
    - cron: '0 23,3,7,13 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why is this run being manually triggered?'
        required: false
        default: 'manual refresh'

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run snapshot script
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 scripts/snapshot-meta-data.py

      - name: Commit + push snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots
          if git diff --staged --quiet; then
            echo "No snapshot changes — skipping commit."
          else
            TS=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Snapshot: Meta data refresh ${TS}"
            git pull --rebase origin main
            git push
          fi
